name: Weekly Book Schedule Update

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Allow manual triggering of the workflow from the Actions tab

permissions:
  contents: write # Needed to commit and push changes back to the repository

jobs:
  update-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Fetch and Compile Book Events
        run: |
          node scripts/fetch-events.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/events.json
          
          # Only commit if there are actual modifications in events.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update book events schedule (weekly run)"
            git push
          else
            echo "No changes detected in events.json. Skipping push."
          fi
